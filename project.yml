name: CannabisMasterclass
options:
  bundleIdPrefix: com.cannamc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  CannabisMasterclass:
    type: application
    platform: iOS
    sources:
      - path: CannabisMasterclass
        excludes:
          - "**/*.xcassets"
    resources:
      - path: CannabisMasterclass/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cannamc.ios
        INFOPLIST_FILE: CannabisMasterclass/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        SUPPORTS_MACCATALYST: "NO"
    dependencies: []
    preBuildScripts: []
    postBuildScripts: []
