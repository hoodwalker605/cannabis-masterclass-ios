name: Build iOS App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List schemes
        run: xcodebuild -list

      - name: List available platforms
        run: xcodebuild -showsdks | grep -i simulator

      - name: Build (Simulator)
        run: |
          xcodebuild build \
            -project CannabisMasterclass.xcodeproj \
            -scheme CannabisMasterclass \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Find and package build
        run: |
          echo "=== Build products ==="
          find ./DerivedData/Build/Products -type d 2>/dev/null || echo "No products found"
          
          APP_PATH=$(find ./DerivedData/Build/Products -name "CannabisMasterclass.app" -type d 2>/dev/null | head -1)

          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r CannabisMasterclass-Simulator.zip Payload
            rm -rf Payload
          else
            echo "No .app found - build verified Swift compilation succeeds"
          fi

      - name: Upload Build Artifact
        if: hashFiles('CannabisMasterclass-Simulator.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: CannabisMasterclass-Simulator
          path: CannabisMasterclass-Simulator.zip
          retention-days: 7
