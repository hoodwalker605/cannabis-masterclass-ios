name: Build iOS App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS Simulator Runtime
        run: |
          sudo xcodebuild -downloadPlatform iOS
          xcrun simctl runtime add "$(xcodebuild -downloadPath)/iOS_18.2_Simulator_Runtime.dmg" 2>/dev/null || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available | grep -i iphone | head -5

      - name: Build (Simulator)
        run: |
          xcodebuild build \
            -project CannabisMasterclass.xcodeproj \
            -scheme CannabisMasterclass \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Build
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products -name "CannabisMasterclass.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r CannabisMasterclass-Simulator.zip Payload
            rm -rf Payload
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CannabisMasterclass-Simulator
          path: CannabisMasterclass-Simulator.zip
          retention-days: 7
          if-no-files-found: ignore
