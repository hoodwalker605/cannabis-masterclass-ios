name: Build iOS App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Available Simulators
        run: xcrun simctl list devices available | grep -i "iphone" | head -5

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project CannabisMasterclass.xcodeproj \
            -scheme CannabisMasterclass \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Package
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products -name "CannabisMasterclass.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r CannabisMasterclass.zip Payload
            rm -rf Payload
          else
            echo "Build产物未找到，但编译验证通过"
            find ./DerivedData/Build/Products -type f 2>/dev/null | head -20
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CannabisMasterclass
          path: CannabisMasterclass.zip
          retention-days: 7
          if-no-files-found: ignore
