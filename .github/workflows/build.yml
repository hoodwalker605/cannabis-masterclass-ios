name: Build iOS App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List installed Xcodes
        run: ls /Applications/ | grep -i xcode

      - name: Select Xcode 16.0
        run: |
          if [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          else
            echo "No Xcode 16.x found, using default"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Available Simulators
        run: xcrun simctl list devices available | grep -i "iphone" | head -5

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project CannabisMasterclass.xcodeproj \
            -scheme CannabisMasterclass \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Package
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products -name "CannabisMasterclass.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r CannabisMasterclass.zip Payload
            rm -rf Payload
          else
            echo "Build verified - no .app artifact for generic destination"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CannabisMasterclass
          path: CannabisMasterclass.zip
          retention-days: 7
          if-no-files-found: ignore
