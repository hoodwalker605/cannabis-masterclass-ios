name: Build iOS App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List schemes
        run: xcodebuild -list

      - name: List available simulators
        run: xcrun simctl list devices available | grep -i iphone

      - name: Build (Simulator)
        run: |
          xcodebuild build \
            -project CannabisMasterclass.xcodeproj \
            -scheme CannabisMasterclass \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: List build products
        run: find ./DerivedData/Build/Products -name "*.app" -type d

      - name: Package as IPA
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products -name "CannabisMasterclass.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "App not found, listing products:"
            find ./DerivedData/Build/Products -type f
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r CannabisMasterclass-Simulator.zip Payload
          rm -rf Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CannabisMasterclass-Simulator
          path: CannabisMasterclass-Simulator.zip
          retention-days: 7
