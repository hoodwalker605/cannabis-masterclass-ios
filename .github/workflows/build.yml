name: Build iOS App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List schemes
        run: xcodebuild -list

      - name: Build (Simulator)
        run: |
          xcodebuild build \
            -project CannabisMasterclass.xcodeproj \
            -scheme CannabisMasterclass \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Find and package build
        run: |
          echo "=== DerivedData contents ==="
          find ./DerivedData -name "*.app" -type d 2>/dev/null || true
          find ./DerivedData -name "*.ipa" 2>/dev/null || true
          find ./DerivedData/Build/Products -type d 2>/dev/null || true

          APP_PATH=$(find ./DerivedData/Build/Products -name "CannabisMasterclass.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found. Listing all files in Build/Products:"
            find ./DerivedData/Build/Products -type f 2>/dev/null || echo "Build/Products is empty or missing"
            echo ""
            echo "Build succeeded but artifact not found - this is expected for generic destination."
            echo "The build verified that all Swift code compiles successfully."
            exit 0
          fi

          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r CannabisMasterclass-Simulator.zip Payload
          rm -rf Payload

      - name: Upload Build Artifact
        if: hashFiles('CannabisMasterclass-Simulator.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: CannabisMasterclass-Simulator
          path: CannabisMasterclass-Simulator.zip
          retention-days: 7
